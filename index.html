<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Katoda</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:
radial-gradient(circle at top right, rgba(108,78,246,0.15), transparent 30%),
linear-gradient(150deg,#130D1A 0%,#1E1228 60%,#2D1F3D 100%);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
color:white;
text-align:center;
padding:40px;
position:relative;
}

body::before{
content:'';
position:absolute;
inset:0;
background-image:
linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
background-size:40px 40px;
}

.contenedor{
max-width:900px;
position:relative;
z-index:1;
}

.logo{
margin-bottom:40px;
}

.logo img{
width:260px;
max-width:80%;
}

h1{
font-size:clamp(40px,6vw,70px);
margin-bottom:20px;
font-weight:800;
letter-spacing:-2px;
}

p{
font-size:20px;
line-height:1.8;
color:rgba(255,255,255,0.65);
max-width:700px;
margin:0 auto 50px;
}

.botones{
display:flex;
gap:24px;
justify-content:center;
flex-wrap:wrap;
}

.boton{
display:inline-flex;
align-items:center;
justify-content:center;
min-width:220px;
padding:22px 34px;
border-radius:18px;
text-decoration:none;
color:white;
font-size:20px;
font-weight:700;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.10);
transition:0.3s;
backdrop-filter:blur(10px);
}

.boton:hover{
transform:translateY(-5px);
background:rgba(108,78,246,0.18);
border-color:rgba(108,78,246,0.35);
}

.tag{
margin-top:40px;
font-size:13px;
letter-spacing:2px;
text-transform:uppercase;
color:#A98EFF;
}

</style>
</head>

<body>

<div class="contenedor">

<div class="logo">
<img src="SET/katoda-logo-blanco.svg" alt="Katoda">
</div>

<h1>Katoda</h1>

<p>
Formación aplicada y soluciones digitales para potenciar habilidades, procesos y negocios.
</p>

<div class="botones">

<a class="boton" href="cursos.html">
Cursos
</a>

<a class="boton" href="asesorias.html">
Asesorías
</a>

</div>

<div class="tag">
Excel • Power BI • Automatización • Datos • Digitalización
</div>

</div>

</body>
</html>
